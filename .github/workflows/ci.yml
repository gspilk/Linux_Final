name: CI Pipeline

on:
  push:
    branches: [main, adding_branch]
  pull_request:
    branches: [main,  adding_branch]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v
    
      - name: Run tests with timer
        run: { time npm test; } > test_results.log 2>&1
      
      - name: Upload Test Logs
        uses: actions/uploads-artifacts@v4
        if: always()
        with:
          name: test-execution-logs
          path: test_results.log
