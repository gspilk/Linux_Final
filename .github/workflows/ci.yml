name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v --durations=5 | tee test-results.log

      - name: Run Pylint
        run: pylint app.py test_app.py --fail-under=3.0

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.log
